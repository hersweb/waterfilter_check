<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>濾水壺小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #0ea5e9; }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-[#f4f9ff]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // 這裡定義圖示元件 (因為直接引入 lucide-react 在 CDN 環境較複雜，我們用簡單版)
        const Icon = ({ name, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            // --- 這裡貼上你之前的 React 邏輯程式碼 ---
            // 注意：把原本程式碼中的 <Droplet /> 改成 <Icon name="droplet" /> 類推
            
            const [count, setCount] = useState(0); // 範例

            return (
                <div className="min-h-screen p-4 text-center">
                    <h1 className="text-2xl font-bold text-blue-600">濾水小幫手</h1>
                    <div className="mt-10 p-6 bg-white rounded-3xl shadow-xl">
                        <p>網頁已經成功跑起來囉！</p>
                        <button 
                            onClick={() => setCount(count + 1)}
                            className="mt-4 bg-blue-500 text-white px-6 py-2 rounded-full"
                        >
                            測試點擊：{count}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
